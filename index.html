<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <title>Para Mamá ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Partículas -->
    <div id="particulas"></div>

    <!-- Música -->
    <audio id="musica" autoplay loop>

        <source src="musica/cancion.mp3" type="audio/mp3">

    </audio>

    <!-- Inicio -->
    <section id="inicio">

        <h1 class="typing">
            Para la mejor mamá del mundo ❤️
        </h1>

        <!-- Cuenta regresiva -->
        <div id="cuentaRegresiva">10</div>

        <button id="btnComenzar" onclick="iniciar()">
            Comenzar
        </button>

    </section>

    <!-- Slideshow -->
    <section id="slideshow" class="oculto">

        <img id="foto">

        <div id="mensaje"></div>

    </section>

    <!-- Final -->
    <section id="final" class="oculto">

        <h1 class="final-texto">
            Te amo muchísimo mamá ❤️
        </h1>

        <p>
            Gracias por todo lo que haces por mí.
        </p>

    </section>

    <script src="script.js"></script>

</body>
</html>
